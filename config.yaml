# Simulation Configuration for MGKMC
# Units: Stresses in GPa, Strains are dimensionless, Temperature in K
# Energy Barriers in eV, Voxel Size (Pixel) in nm

# RNG Settings
seed: 42

# Main Simulation Mode
# Options: "kmc" (default) or "linear_elastic"
simulation_type: "kmc"

# System Geometry
system:
  dimensionality: "2d" # Options: "2d" or "3d"
  plane_mode: "plane_strain" # Options: "plane_strain" or "plane_stress" (ignored if not 2d)
  strain_assumption: "finite_strain" # Options: "small_strain" or "finite_strain"
  hyperelastic_model: "svk"          # Options: "svk" or "neo_hookean" (ignored if small_strain)
  3d_barriers: false                 # Enable fully 3D isotropic STZ eigenstrain directions (default: false)
  nx: 32
  ny: 32
  nz: 1
  pixel: 0.7       # Voxel size (nm)
  M: 20            # Number of shear orientations per voxel
  gamma0: 0.14     # Reference strain
  num_threads: 1   # Number of threads for pyfftw
  solver: "al"     # Solver for finite strain paths: "al" (Augmented Lagrangian), "newton_cg" (Newton-CG), or "dbfft" (Displacement-Based FFT)

# Material Properties
material:
  E:
    mode: "constant"
    value: 70     # Elastic constant (GPa)
  nu:
    mode: "constant"
    value: 0.3     # Poisson's ratio
  A: -100.0       # Third-order constant A (GPa)
  B: -100.0       # Third-order constant B (GPa)
  C: -100.0       # Third-order constant C (GPa)

# Physics & Softening
physics:
  enable_softening: true
  softening_scheme: "isotropic"   # "isotropic" or "directional"
  jp: 20                          # Plastic-to-Softening coupling
  jt: 0                           # Thermal-to-Softening coupling
  neighbor_softening_fraction: 0.0 # Fraction of softening applied to the immediate neighbors
  q_act_temp: 0.37                # Activation barrier for JT recovery (eV)
  softening_cap: 0.916            # Max local barrier reduction (eV)
  stability_threshold: 0.0        # Threshold for athermal instability check
  redraw_directions: true         # Redraw all mode directions in voxel after flip
  redraw_barriers: true           # Redraw all mode initial barriers (Q0) in voxel after flip

# Barrier Generator
barriers:
  type: "gaussian"
  kwargs:
    mean: 2.2    # eV
    std: 0.45      # eV
    min_cutoff: 0.0

# Simulation Dynamics
dynamics:
  fast_patching:
    enabled: false            # Under finite strain, fast patching must be false
    patch_radius: 3
    sync_interval: 100
  temperature: 300.0              # Operating Temperature (K)
  physical_strain_rate: 1.0e7     # Physical macro strain rate (1/s)
  nu0: 1.0e13                     # Attempt frequency (Hz)
  instability_mode: "cascade"     # 'cascade' or 'kmc'
  cascade_timing: "none"
  scale_rate_by_volume: false      # Toggle whether to multiply activation rates by voxel volume

# Loading
loading:
  eps_target: 0.05                # Target global macroscopic strain
  step_size: 2.0e-3               # Strain increment per global elastic loading step (40 steps total for 8% strain)

# Boundary Conditions
boundary_conditions:
  driving_component: "xx"         # Driven strain component
  mixed_targets:                  # Stress targets for non-driven components (GPa)
    yy: 0.0                       # yy stress free
  mixed_tol: 1.0                  # Tolerance for stress convergence (MPa)

# Output & Logging
output:
  directory: "simulation_results"
  duplicate_directory_action: "delete"
  checkpoint_interval: "none"
  checkpoint_elastic_only: true
  enable_save_q: false
  save_q_interval: 1
  save_q_elastic_only: true
  enable_plotting: true
  enable_console: true
  summary_filename: "summary_log.txt"
  enable_summary_log: true
  enable_global_log: true
  enable_cascade_log: true
  enable_kmc_log: true
  vtk_interval: "last"
  vtk_elastic_only: true
  track_cascades: false
  enable_config_backup: true

# Detection Metrics
detection:
  stop_on_stress_drop: 0.20       # Drop fraction to stop
  stop_post_drop_steps: 20
  ignore_drop_steps: 10
  stress_drop_lookback: 10
  max_cascade_steps_pct: 0.3
  max_kmc_steps_pct: 0.3
