# ==============================================================================
# Simulation Configuration for MGKMC (Multiscale Glass Kinetic Monte Carlo)
# ==============================================================================
# Units System:
#   - Stresses / Elastic Moduli: GPa (automatically converted to Pa in-run if < 1e6)
#   - Strains: Dimensionless
#   - Temperature: Kelvin (K)
#   - Activation Energy / Barriers: Electron-Volts (eV)
#   - Lengths / Grid Sizes: Nanometers (nm) (voxel size / pixel length)
#   - Time: Seconds (s)
# ==============================================================================

# ------------------------------------------------------------------------------
# RNG Settings
# ------------------------------------------------------------------------------
seed: 42                           # Integer seed for deterministic runs (null/empty for random)

# ------------------------------------------------------------------------------
# Main Simulation Mode
# ------------------------------------------------------------------------------
# Options:
#   - "kmc": Run the full Kinetic Monte Carlo plastic shear transformation simulation
#   - "elastic": Establish initial elastic equilibrium and exit immediately
simulation_type: "kmc"

# ------------------------------------------------------------------------------
# System Geometry & Solvers
# ------------------------------------------------------------------------------
system:
  dimensionality: "2d"            # System dimension. Options: "2d" or "3d"
  
  plane_mode: "plane_strain"      # 2D strain state. Options: "plane_strain" or "plane_stress" (ignored in 3d)
  
  strain_assumption: "finite_strain" # Strain kinematics. Options: "small_strain" (linear) or "finite_strain" (large deformation)
  
  hyperelastic_model: "svk"       # Elastic model. 
                                  # Finite-strain models: 
                                  #   - "svk" (Saint Venant-Kirchhoff)
                                  #   - "neo_hookean" (Neo-Hookean - 2D only)
                                  #   - "murnaghan" (Murnaghan non-linear elasticity)
                                  # Small-strain models:
                                  #   - "secant_degradation" (Isotropic stiffness degradation)
                                  #   - "linear" (Default hookean)
                                  
  solver: "al"                    # Non-linear FFT solver for finite strain path. Options:
                                  #   - "al" (Augmented Lagrangian - robust, recommended)
                                  #   - "newton_cg" (Newton-CG - fast but sensitive to local failures)
                                  #   - "dbfft" (Displacement-Based FFT - preconditioned solver)
                                  
  3d_barriers: false              # If true, enables fully 3D isotropic STZ eigenstrain catalog directions (default: false)
  
  nx: 32                          # Grid dimensions: X direction (number of voxels)
  ny: 32                          # Grid dimensions: Y direction (number of voxels)
  nz: 1                           # Grid dimensions: Z direction (set to 1 for 2D, >1 for 3D)
  pixel: 0.7                      # Voxel width/length/thickness in nanometers (nm)
  M: 20                           # Number of candidate shear orientations (STZ modes) generated per voxel
  gamma0: 0.14                    # Reference shear strain magnitude for a plastic transformation event
  num_threads: 1                  # Number of CPU threads for PyFFTW calculations (speed up on large grids)

# ------------------------------------------------------------------------------
# Material Properties
# ------------------------------------------------------------------------------
material:
  # Standard elastic property fields (used for constant or heterogeneous generation)
  E:
    mode: "constant"              # Field generation mode. Options: "constant", "generated" (correlated field), "file"
    value: 70                     # Young's modulus (GPa)
  nu:
    mode: "constant"              # Field generation mode. Options: "constant", "generated" (correlated field), "file"
    value: 0.3                    # Poisson's ratio
    
  # Direct Lame parameters (Can optionally be used/uncommented to override E/nu):
  # lambda: 40.38                 # First Lame parameter (GPa)
  # mu: 26.92                     # Shear modulus (GPa)
  
  # --- Murnaghan Elasticity Parameters (Third-order elastic constants, GPa) ---
  # Only used when hyperelastic_model is "murnaghan"
  A: -100.0                       # Murnaghan coefficient A (GPa)
  B: -100.0                       # Murnaghan coefficient B (GPa)
  C: -100.0                       # Murnaghan coefficient C (GPa)
  
  # --- Secant Elastic Degradation Parameters ---
  # Only used when hyperelastic_model is "secant_degradation"
  d: 0.0                          # Max degradation fraction (0.0 = no degradation, 1.0 = total softening)
  k: 0.0                          # Degradation rate parameter (larger values lead to faster softening)

# ------------------------------------------------------------------------------
# Physics & Softening
# ------------------------------------------------------------------------------
physics:
  enable_softening: true          # Toggle plastic softening behavior following KMC flips
  
  softening_scheme: "isotropic"   # Softening decay directional layout. Options:
                                  #   - "isotropic" (barrier reduction uniform in all directions)
                                  #   - "directional" (reduction depends on project direction of shear)
                                  
  jp: 20                          # Plastic coupling parameter (jp * vm^2) scaling permanent local softening
  jt: 0                           # Thermal coupling parameter scaling transient/restorative local softening
  
  neighbor_softening_fraction: 0.0 # Fraction of plastic softening applied to adjacent voxel neighbors (0.0 to 1.0)
  q_act_temp: 0.37                # Activation energy barrier for Johari-Goldstein (JG) beta-relaxation/thermal recovery (eV)
  softening_cap: 0.916            # Maximum allowed local energy barrier reduction (eV)
  stability_threshold: 0.0        # Energy threshold (eV) below which voxel modes are considered athermally unstable
  
  redraw_directions: true         # If true, re-randomize STZ candidate orientations in a voxel after a flip
  redraw_barriers: true           # If true, draw new baseline initial barriers (Q0) for voxel modes after a flip
  
  stz_mode: "pure_shear"          # Eigenstrain tensor layout mode. Options: "pure_shear" or "simple_shear"

# ------------------------------------------------------------------------------
# Barrier Generator
# ------------------------------------------------------------------------------
# Determines the statistical distribution of initial activation barriers (Q0) in the glass state.
barriers:
  type: "gaussian"                # Distribution type. Options: "gaussian", "rayleigh", "modified_rayleigh", "modified_rayleigh_with_exponential"
  kwargs:
    mean: 2.2                     # Mean activation barrier (eV)
    std: 0.45                     # Standard deviation of barriers (eV)
    min_cutoff: 0.0               # Minimum allowed cutoff value for a barrier (eV)

# ------------------------------------------------------------------------------
# Simulation Dynamics
# ------------------------------------------------------------------------------
dynamics:
  fast_patching:
    enabled: false                # Toggle fast FFT local green-function patching. Must be false for finite-strain.
    patch_radius: 3               # Voxel interaction influence radius for local updates
    sync_interval: 100            # Step frequency to re-calculate global stress field via full FFT
    
  temperature: 300.0              # Operating temperature of the simulation (K)
  physical_strain_rate: 1.0e7     # Physical macro strain rate applied to the cell (1/s)
  nu0: 1.0e13                     # Fundamental atomic attempt frequency (Hz)
  
  cascade_mode: false             # Toggle athermal cascade handling. Options:
                                  #   - true (athermal avalanches cascade immediately)
                                  #   - false (unstable flips are handled sequentially via KMC rates; default)
                                  
  cascade_timing: "none"          # Time progression during athermal cascade cascades. Options:
                                  #   - "none" (cascades happen instantaneously, time += 0)
                                  #   - "single" (cascades add exactly one time-step)
                                  #   - "per_flip" (each cascade step adds an expected flip time)
                                  
  scale_rate_by_volume: false     # If true, scales the KMC rate equations by the voxel volume (nm^3)

# ------------------------------------------------------------------------------
# Thermal Evolution & Coupling
# ------------------------------------------------------------------------------
# Solves the Fourier-space heat equation coupled with local plastic dissipation.
thermal:
  enable_thermal: false           # Toggle active local heat generation and diffusion solver (Fourier space)
  Cp: 420.0                       # Specific heat capacity of the glass matrix (J / kg * K)
  rho: 6125.0                     # Mass density of the glass (kg / m^3)
  thermal_diffusivity: 3.0e-6     # Thermal diffusivity (m^2/s)
  thermal_coords: "pixel"         # Calculation frame. Options: "pixel" or "physical"
  temperature_cap: 1000.0         # Maximum allowed local temperature (K) to avoid numerical divergence
  thermostat: false               # Toggle heat-sink coupling to a thermal bath
  tau_bath: 0.0                   # Bath coupling relaxation time constant (s). If 0, mean temperature is fixed.

# ------------------------------------------------------------------------------
# Macro Loading & Strain Control
# ------------------------------------------------------------------------------
loading:
  eps_target: 0.05                # Target global macroscopic strain (e.g. 0.05 = 5% strain)
  step_size: 2.0e-3               # Strain increment per macroscopic loading step (e.g., 2e-3 = 0.2%)

# ------------------------------------------------------------------------------
# Boundary Conditions
# ------------------------------------------------------------------------------
boundary_conditions:
  driving_component: "xx"         # Driven loading strain component. Options: "xx", "yy", "xy" (in 2D/3D); "zz", "xz", "yz" (in 3D)
  
  mixed_targets:                  # Relaxation stress targets (GPa) for non-driven coordinates (Poisson expansion)
    yy: 0.0                       # Free lateral expansion in yy (0.0 GPa target stress)
    # zz: 0.0                     # Free lateral expansion in zz (uncomment if dimensionality is 3d)
    
  mixed_tol: 1.0                  # Stress relaxation error tolerance (MPa) for lateral expansion iteration

# ------------------------------------------------------------------------------
# Output & Logging
# ------------------------------------------------------------------------------
output:
  directory: "simulation_results" # Folder name where checkponts, VTK, and logs are saved
  duplicate_directory_action: "delete" # Directory conflict strategy. Options: "delete", "rename", "overwrite"
  
  checkpoint_interval: "none"     # Interval to save simulation binary checkpoint. Options: integer, "none", "last", "current"
  checkpoint_elastic_only: true   # If true, checkpoints are saved only during global elastic steps (reducing overhead)
  
  enable_save_q: false            # Toggle saving raw spatial state datasets (eigenstrains and barriers)
  save_q_interval: 1              # Output step interval for state dataset exports
  save_q_elastic_only: true       # Save state datasets only on elastic loading steps
  
  enable_plotting: true           # Enable generation and saving of summary charts/plots (stress-strain curves)
  enable_console: true            # Toggle print verbosity to terminal during iterations
  enable_config_backup: true      # Save a backup of this config.yaml file to the output directory
  
  # Logging file selectors
  summary_filename: "summary_log.txt" # Name of the core summary text log file
  enable_summary_log: true        # Log high-level step results (time, strain, stress, temperature)
  enable_global_log: true         # Log global elastic and plastic statistics
  enable_cascade_log: true        # Log avalanche cascade details (flips, volumes, durations)
  enable_kmc_log: true            # Log rate selection and event queues
  
  # VTK/Paraview Output
  vtk_interval: "last"            # Export grid spatial fields (.vtu). Options: integer (step interval), "none", "last"
  vtk_elastic_only: true          # Save VTK datasets only on elastic loading steps (strongly recommended to save space)
  track_cascades: false           # Save sequential VTK files step-by-step *during* a cascade (warning: creates many files)

# ------------------------------------------------------------------------------
# Yield & Cascade Detection Metrics
# ------------------------------------------------------------------------------
detection:
  stop_on_stress_drop: 0.20       # Stop simulation early if stress drops by this fraction (0.20 = 20% drop from yield peak)
  stop_post_drop_steps: 20        # Number of buffer steps to execute and log after a stress drop is detected
  ignore_drop_steps: 10           # Initial loading steps to ignore stress drops (preventing premature exit on transients)
  stress_drop_lookback: 10        # Rolling window size of steps to evaluate stress drop trends
  
  # Cascade avalanche limit controls (prevents infinite loop cascades)
  max_cascade_steps_pct: 0.3      # Cancel/truncate cascade if flips exceed this fraction of total system voxels
  max_kmc_steps_pct: 0.3          # Truncate sequential KMC steps if events exceed this fraction of total system voxels
